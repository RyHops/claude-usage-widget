<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self'; style-src 'self'; img-src 'self' data:; font-src 'self'; connect-src 'none'; object-src 'none'; base-uri 'none'; frame-ancestors 'none';">
    <link rel="stylesheet" href="tray-popup.css">
</head>
<body>
    <div class="popup-container">
    <div class="popup-header">
        <svg width="12" height="12" viewBox="0 0 16 16" fill="none">
            <path d="M8 1.5a6.5 6.5 0 1 0 0 13 6.5 6.5 0 0 0 0-13Z" stroke="#cba6f7" stroke-width="1.5" fill="none" opacity="0.5"/>
            <path d="M8 1.5a6.5 6.5 0 0 1 0 13" stroke="#cba6f7" stroke-width="1.5" stroke-linecap="round" fill="none"/>
            <circle cx="8" cy="1.5" r="1.5" fill="#cba6f7"/>
        </svg>
        <span>Claude Usage</span>
        <span class="popup-quip" id="quipText">all systems nominal</span>
    </div>

    <div class="metric-row">
        <span class="metric-label">Session</span>
        <div class="progress-bar">
            <div class="progress-fill" id="sessionFill"></div>
        </div>
        <span class="metric-pct" id="sessionPct">0%</span>
        <span class="metric-timer" id="sessionTimer">--:--</span>
    </div>

    <div class="metric-row">
        <span class="metric-label">Weekly</span>
        <div class="progress-bar">
            <div class="progress-fill weekly" id="weeklyFill"></div>
        </div>
        <span class="metric-pct" id="weeklyPct">0%</span>
        <span class="metric-timer" id="weeklyTimer">--:--</span>
    </div>

    <div class="metric-row hidden" id="extraRow">
        <span class="metric-label">Extra</span>
        <div class="progress-bar">
            <div class="progress-fill extra" id="extraFill"></div>
        </div>
        <span class="metric-pct" id="extraPct">0%</span>
        <span class="metric-timer"></span>
    </div>
    </div>

    <script src="tray-popup.js"></script>
</body>
</html>
